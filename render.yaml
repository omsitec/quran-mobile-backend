services:
  - type: web
    name: quran-mobile-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: QURAN_API_CLIENT_ID
        sync: false
      - key: QURAN_API_CLIENT_SECRET
        sync: false
      - key: QURAN_API_OAUTH_ENDPOINT
        value: https://prelive-oauth2.quran.foundation
      - key: QURAN_API_CONTENT_ENDPOINT
        value: https://apis-prelive.quran.foundation
      - key: QURAN_API_OAUTH_SCOPES
        value: content
